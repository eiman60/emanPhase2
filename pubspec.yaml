name: personal_hajj_e_guide

description: Personal Hajj E-guide home page UI.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_floating_bottom_bar: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
flutter_intl:
  enabled: true
